<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Chat</h2>

<div id="messages"></div>

<input id="input" placeholder="Ask..." />
<button onclick="send()">Send</button>
<button onclick="logout()">Logout</button>

<script>
const supabase = window.supabase.createClient(
  "https://thhfwcmxidluvskeaebo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaGZ3Y214aWRsdXZza2VhZWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzEzNTQsImV4cCI6MjA4OTI0NzM1NH0.Q7QPaCbfwKesITzS9vDjh1lALvRZlt3wxAerAa4D7No
"
);

// check login
(async () => {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) location.href = "login.html";
})();

// send message
async function send() {
  const text = input.value;
  if (!text) return;

  add("You: " + text);
  input.value = "";

  // 🔥 REAL AI CALL
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer YOUR_OPENAI_API_KEY",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();
  const reply = data.choices?.[0]?.message?.content || "No reply";

  add("AI: " + reply);

  // save to DB
  await supabase.from("messages").insert([
    { user_msg: text, ai_msg: reply }
  ]);
}

// UI
function add(text) {
  const div = document.createElement("div");
  div.innerText = text;
  messages.appendChild(div);
}

// logout
async function logout() {
  await supabase.auth.signOut();
  location.href = "login.html";
}
</script>

</body>
</html>
