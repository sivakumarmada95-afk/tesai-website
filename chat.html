<!DOCTYPE html>
<html>

<head>
<title>TesAI Chat</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

.sidebar{
width:250px;
background:#202123;
color:white;
height:100vh;
padding:20px;
}

.chat{
flex:1;
padding:20px;
}

#messages{
height:350px;
border:1px solid #ccc;
padding:10px;
overflow:auto;
margin-bottom:10px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">
<h2>TesAI</h2>
<button onclick="clearChat()">+ New Chat</button>
<p>Chat 1</p>
<p>Chat 2</p>
</div>

<div class="chat">

<h2>TesAI Assistant</h2>

<div id="messages"></div>

<input id="userInput" placeholder="Ask anything...">

<button onclick="sendMessage()">Send</button>

</div>

<script>

function sendMessage() {

var input = document.getElementById("userInput");
var message = input.value;

if(message == "") return;

var chat = document.getElementById("messages");

chat.innerHTML += "<p><b>You:</b> " + message + "</p>";
chat.innerHTML += "<p><b>TesAI:</b> I'm learning. AI coming soon!</p>";

input.value = "";

}

function clearChat(){

document.getElementById("messages").innerHTML="";

}

</script>

</body>
</html>
