<div class="chat">

<h2>TesAI Assistant</h2>

<div id="messages" style="height:400px;border:1px solid #ccc;padding:10px;overflow:auto;"></div>

<input id="userInput" placeholder="Ask anything...">

<button onclick="sendMessage()">Send</button>

</div>

<script>

function sendMessage(){

let input=document.getElementById("userInput");

let message=input.value;

if(message==="") return;

let chat=document.getElementById("messages");

chat.innerHTML+= "<p><b>You:</b> "+message+"</p>";

chat.innerHTML+= "<p><b>TesAI:</b> I'm learning... AI reply coming soon!</p>";

input.value="";

}

function newChat(){

document.getElementById("messages").innerHTML="";

}

</script>
