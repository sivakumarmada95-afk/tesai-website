<!DOCTYPE html>
<html>

<head>
<title>TesAI Chat</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f5f5f5;
}

.sidebar{
width:250px;
background:#202123;
color:white;
height:100vh;
padding:20px;
}

.chat{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
border:1px solid #ccc;
padding:10px;
overflow:auto;
margin-bottom:10px;
background:white;
}

.message{
padding:10px;
margin:5px 0;
border-radius:8px;
max-width:60%;
}

.user{
background:#cfe9ff;
align-self:flex-end;
}

.ai{
background:#e5e5e5;
align-self:flex-start;
}

.inputArea{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
}

button{
padding:10px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>TesAI</h2>

<button onclick="clearChat()">+ New Chat</button>

<p>Chat 1</p>
<p>Chat 2</p>

</div>

<div class="chat">

<h2>TesAI Assistant</h2>

<div id="messages"></div>

<div class="inputArea">

<input id="userInput" placeholder="Ask anything...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

function sendMessage(){

var input=document.getElementById("userInput");
var message=input.value;

if(message==="") return;

var chat=document.getElementById("messages");

chat.innerHTML += "<div class='message user'>"+message+"</div>";

chat.innerHTML += "<div class='message ai'>TesAI is thinking...</div>";

const response = await fetch("/api/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ message: message })
});

const data = await response.json();

chat.innerHTML += "<div class='message ai'>" + data.reply + "</div>";

input.value="";

chat.scrollTop = chat.scrollHeight;

}

function clearChat(){

document.getElementById("messages").innerHTML="";

}

document.getElementById("userInput").addEventListener("keypress", function(event){

if(event.key === "Enter"){

sendMessage();

}

});

</script>

</body>

</html>
