<script>

async function sendMessage() {

  const input = document.getElementById("userInput");
  const message = input.value.trim();

  if (!message) return;

  const chat = document.getElementById("messages");

  chat.innerHTML += `<div class="message user">${message}</div>`;
  input.value = "";

  const loading = `<div class="message ai" id="loadingMsg">TesAI is thinking...</div>`;
  chat.innerHTML += loading;

  try {

    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    document.getElementById("loadingMsg").remove();

    chat.innerHTML += `<div class="message ai">${data.reply}</div>`;

  } catch (error) {

    document.getElementById("loadingMsg").remove();

    chat.innerHTML += `<div class="message ai">AI connection error.</div>`;

  }

  chat.scrollTop = chat.scrollHeight;

}

function clearChat() {

  document.getElementById("messages").innerHTML = "";

}


// Wait until page loads before attaching button event
window.onload = function() {

  const sendBtn = document.getElementById("sendBtn");
  const input = document.getElementById("userInput");

  if (sendBtn) {
    sendBtn.onclick = sendMessage;
  }

  if (input) {
    input.addEventListener("keypress", function(event){
      if(event.key === "Enter"){
        sendMessage();
      }
    });
  }

};

</script><button id="sendBtn">Send</button>
