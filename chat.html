<!DOCTYPE html>
<html>
<head>
<title>TesAI Chat</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f5f5f5;
}

.sidebar{
width:250px;
background:#202123;
color:white;
height:100vh;
padding:20px;
}

.chat{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
border:1px solid #ccc;
background:white;
padding:10px;
overflow:auto;
margin-bottom:10px;
min-height:400px;
}

.message{
padding:10px;
margin:8px 0;
border-radius:8px;
max-width:70%;
}

.user{
background:#cfe9ff;
margin-left:auto;
}

.ai{
background:#e5e5e5;
}

.inputArea{
display:flex;
gap:10px;
}

#userInput{
flex:1;
padding:10px;
font-size:16px;
}

#sendBtn{
padding:10px 20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>TesAI</h2>
<button onclick="clearChat()">+ New Chat</button>
<p>Chat 1</p>
<p>Chat 2</p>
</div>

<div class="chat">

<h1>TesAI Assistant</h1>

<div id="messages"></div>

<div class="inputArea">
<input id="userInput" placeholder="Ask anything...">
<button id="sendBtn">Send</button>
</div>

</div>

<script>

async function sendMessage(){

const input=document.getElementById("userInput")
const message=input.value.trim()

if(!message) return

const chat=document.getElementById("messages")

chat.innerHTML+=`<div class="message user">${message}</div>`

input.value=""

chat.innerHTML+=`<div class="message ai" id="loading">TesAI thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const response=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
})

const data=await response.json()

document.getElementById("loading").remove()

chat.innerHTML+=`<div class="message ai">${data.reply}</div>`

}catch(e){

document.getElementById("loading").remove()

chat.innerHTML+=`<div class="message ai">Error connecting AI</div>`

}

chat.scrollTop=chat.scrollHeight

}

function clearChat(){
document.getElementById("messages").innerHTML=""
}

window.onload=function(){

document.getElementById("sendBtn").onclick=sendMessage

document.getElementById("userInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage()
}
})

}

</script>

</body>
</html>
