<!DOCTYPE html>
<html>
<head>
<title>TesAI Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
font-family: Arial;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box {
background:white;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input {
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button {
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.blue {background:#2563eb;color:white;}
.red {background:#ea4335;color:white;}
.black {background:black;color:white;}
</style>

</head>

<body>

<div class="box">
<h2>TesAI Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="blue" onclick="loginEmail()">Login with Email</button>
<button class="blue" onclick="signupEmail()">Create Account</button>

<hr>

<button class="red" onclick="googleLogin()">Login with Google</button>
<button class="black" onclick="githubLogin()">Login with GitHub</button>
</div>

<script>

// 🔥 VERY IMPORTANT FIX
const supabaseClient = window.supabase.createClient(
"https://thhfwcmxidluvskeaebo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaGZ3Y214aWRsdXZza2VhZWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzEzNTQsImV4cCI6MjA4OTI0NzM1NH0.Q7QPaCbfwKesITzS9vDjh1lALvRZlt3wxAerAa4D7No"
);

// EMAIL LOGIN
async function loginEmail() {
try {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabaseClient.auth.signInWithPassword({
email,
password
});

if (error) throw error;

alert("Login success ✅");
window.location.href = "chat.html";

} catch (err) {
alert(err.message);
}
}

// SIGNUP
async function signupEmail() {
try {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabaseClient.auth.signUp({
email,
password
});

if (error) throw error;

alert("Signup success ✅ Check email");

} catch (err) {
alert(err.message);
}
}

// GOOGLE LOGIN
async function googleLogin() {
try {
await supabaseClient.auth.signInWithOAuth({
provider: "google",
options: {
redirectTo: "https://tesai.in/chat.html"
}
});
} catch (err) {
alert(err.message);
}
}

// GITHUB LOGIN
async function githubLogin() {
try {
await supabaseClient.auth.signInWithOAuth({
provider: "github",
options: {
redirectTo: "https://tesai.in/chat.html"
}
});
} catch (err) {
alert(err.message);
}
}

</script>

</body>
</html>
