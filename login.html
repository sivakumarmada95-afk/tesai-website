<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="chat"></div>
<input id="input" placeholder="Ask..." onkeydown="if(event.key==='Enter')send()">
<button onclick="send()">Send</button>
<button onclick="logout()">Logout</button>

<script>

const supabase = window.supabase.createClient(
"https://thhfwcmxidluvskeaebo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaGZ3Y214aWRsdXZza2VhZWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzEzNTQsImV4cCI6MjA4OTI0NzM1NH0.Q7QPaCbfwKesITzS9vDjh1lALvRZlt3wxAerAa4D7No
"
);

// LOGIN CHECK
(async()=>{
const {data}=await supabase.auth.getUser();
if(!data.user) location.href="login.html";
})();

// SEND MESSAGE
async function send(){
let msg=input.value;
chat.innerHTML += "<p><b>You:</b>"+msg+"</p>";
input.value="";

// CALL BACKEND
let res = await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data = await res.json();

chat.innerHTML += "<p><b>AI:</b>"+data.reply+"</p>";

// SAVE TO DB
await supabase.from("messages").insert([
{user_msg:msg, ai_msg:data.reply}
]);
}

// LOGOUT
async function logout(){
await supabase.auth.signOut();
location.href="login.html";
}

</script>

</body>
</html>
