<!DOCTYPE html>
<html>
<head>
<title>TesAI Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#343541;color:white;}

.sidebar{
width:250px;
height:100vh;
background:#202123;
position:fixed;
padding:15px;
}

.sidebar button{
width:100%;
margin:10px 0;
padding:10px;
background:#444;
border:none;
color:white;
cursor:pointer;
}

.chat{
margin-left:250px;
display:flex;
flex-direction:column;
height:100vh;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
margin:10px;
padding:10px;
border-radius:8px;
max-width:70%;
}

.user{background:#2563eb;margin-left:auto;}
.bot{background:#444654;}

.input{
display:flex;
padding:10px;
background:#40414f;
}

input{
flex:1;
padding:10px;
border:none;
}

button.send{
padding:10px;
background:#10a37f;
border:none;
color:white;
}
</style>

</head>

<body>

<div class="sidebar">
<h3>TesAI</h3>
<button onclick="newChat()">+ New Chat</button>
<button onclick="logout()">Logout</button>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
<input id="input" placeholder="Ask anything..."
onkeydown="if(event.key==='Enter') send()">
<button class="send" onclick="send()">Send</button>
</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://thhfwcmxidluvskeaebo.supabase.co",
"YOUR_ANON_KEY"
);

// CHECK LOGIN
(async ()=>{
const {data}=await supabase.auth.getUser();
if(!data.user) location.href="login.html";
})();

// ADD MESSAGE
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
messages.appendChild(d);
messages.scrollTop=messages.scrollHeight;
}

// SEND
function send(){
let text=input.value.trim();
if(!text) return;

add(text,"user");
input.value="";

// FAKE AI
setTimeout(()=>{
add("AI: "+text,"bot");
},500);
}

// NEW CHAT
function newChat(){
messages.innerHTML="";
}

// LOGOUT
async function logout(){
await supabase.auth.signOut();
location.href="login.html";
}

</script>

</body>
</html>
