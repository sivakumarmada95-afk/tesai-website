<!DOCTYPE html>
<html>
<head>

<title>TesAI Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:340px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.emailbtn{
background:#2563eb;
color:white;
}

.googlebtn{
background:#ea4335;
color:white;
}

.githubbtn{
background:#000;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>TesAI Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button class="emailbtn" onclick="emailLogin()">Login with Email</button>

<button class="emailbtn" onclick="signup()">Create Account</button>

<hr>

<button class="googlebtn" onclick="googleLogin()">Login with Google</button>

<button class="githubbtn" onclick="githubLogin()">Login with GitHub</button>

</div>


<script>

const supabase = supabase.createClient(
"https://thhfwcmxidluvskeaebo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaGZ3Y214aWRsdXZza2VhZWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzEzNTQsImV4cCI6MjA4OTI0NzM1NH0.Q7QPaCbfwKesITzS9vDjh1lALvRZlt3wxAerAa4D7No"
)



async function emailLogin(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){

alert(error.message)

}else{

location.href="chat.html"

}

}



async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabase.auth.signUp({
email:email,
password:password
})

if(error){

alert(error.message)

}else{

alert("Account created. Please login.")

}

}



async function googleLogin(){

await supabase.auth.signInWithOAuth({
provider:"google"
})

}



async function githubLogin(){

await supabase.auth.signInWithOAuth({
provider:"github"
})

}

</script>

</body>
</html>
