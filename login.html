<!DOCTYPE html>
<html>
<head>
<title>TesAI Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>TesAI Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>
No account?
<a href="signup.html">Signup</a>
</p>

</div>

<script>

const supabase = supabase.createClient(
"https://thhfwcmxidluvskeaebo.supabase.co",
"eyJhbGc....YOUR_KEY"
)

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){
alert(error.message)
}else{
location.href="chat.html"
}

}

</script>

</body>
</html>
