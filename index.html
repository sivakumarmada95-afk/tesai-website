<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TesAI Login</title>

<style>
body {
font-family: Arial, sans-serif;
background: #f4f6f8;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: #fff;
padding: 30px;
border-radius: 10px;
width: 350px;
box-shadow: 0 0 15px rgba(0,0,0,0.1);
text-align: center;
}

h2 {
margin-bottom: 20px;
}

input {
width: 100%;
padding: 12px;
margin: 10px 0;
border-radius: 5px;
border: 1px solid #ccc;
}

button {
width: 100%;
padding: 12px;
margin-top: 10px;
border: none;
border-radius: 5px;
cursor: pointer;
font-size: 14px;
}

.email-btn {
background: #2d6cdf;
color: white;
}

.signup-btn {
background: #3b82f6;
color: white;
}

.google-btn {
background: #ea4335;
color: white;
}

.github-btn {
background: black;
color: white;
}

button:hover {
opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
<h2>TesAI Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button class="email-btn" onclick="loginEmail()">Login with Email</button>
<button class="signup-btn" onclick="signupEmail()">Create Account</button>

<hr>

<button class="google-btn" onclick="googleLogin()">Login with Google</button>
<button class="github-btn" onclick="githubLogin()">Login with GitHub</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ===== CONFIG =====
const supabaseClient = supabase.createClient(
"https://thhfwcmxidluvskeaebo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.Q7QPaCbfwKesITzS9vDjh1lALvRZlt3wxAerAa4D7No"
);

// ===== LOGIN =====
async function loginEmail() {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabaseClient.auth.signInWithPassword({
email,
password
});

if (error) {
alert(error.message);
} else {
alert("Login successful ✅");
window.location.href = "chat.html";
}
}

// ===== SIGNUP =====
async function signupEmail() {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabaseClient.auth.signUp({
email,
password
});

if (error) {
alert(error.message);
} else {
alert("Account created ✅ Check your email");
}
}

// ===== GOOGLE LOGIN =====
async function googleLogin() {
await supabaseClient.auth.signInWithOAuth({
provider: "google",
options: {
redirectTo: "https://tesai.in"
}
});
}

// ===== GITHUB LOGIN =====
async function githubLogin() {
await supabaseClient.auth.signInWithOAuth({
provider: "github",
options: {
redirectTo: "https://tesai.in"
}
});
}

// ===== CHECK USER =====
async function checkUser() {
const { data } = await supabaseClient.auth.getUser();

if (data.user) {
console.log("User:", data.user.email);
}
}

checkUser();

</script>

</body>
</html>
